services:
  # Main application: RSS reader + API + Web UI
  doomscroller:
    build: .
    ports:
      - "6767:6767"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=6767
      - DATA_DIR=/app/data
      - EMBEDDINGS_URL=http://embeddings:8081
    depends_on:
      embeddings:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

  # Embedding model sidecar: nomic-embed-text-v1.5 via llama-server
  embeddings:
    build: ./embeddings
    expose:
      - "8081"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
